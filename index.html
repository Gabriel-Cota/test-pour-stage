<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Internship Tracker</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      gap: 24px;
    }
    .title { font-size: 13px; text-transform: uppercase; letter-spacing: 2px; color: #555; }
    .count { font-size: 64px; font-weight: 700; line-height: 1; }
    .count span { font-size: 18px; color: #555; font-weight: 400; margin-left: 6px; }
    .chart-wrap { width: 100%; max-width: 360px; }
  </style>
</head>
<body>
  <p class="title">Candidatures envoyées</p>
  <p class="count">14 <span>/ 50</span></p>
  <div class="chart-wrap">
    <canvas id="chart"></canvas>
  </div>

  <script>
    new Chart(document.getElementById('chart'), {
      type: 'doughnut',
      data: {
        labels: ['Appliqué', 'Entretien', 'Refusé', 'Restant'],
        datasets: [{
          data: [9, 3, 2, 36],
          backgroundColor: ['#4ade80', '#facc15', '#f87171', '#1f1f1f'],
          borderWidth: 0,
        }]
      },
      options: {
        cutout: '75%',
        plugins: {
          legend: {
            position: 'bottom',
            labels: { color: '#888', padding: 16, font: { size: 12 } }
          }
        }
      }
    });
  </script>
</body>
</html>
